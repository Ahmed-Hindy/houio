name: CI

on:
  push:
    branches:
      - master
      - "experiment/**"
  pull_request:

permissions:
  contents: read

jobs:
  windows-msvc:
    runs-on: windows-2022
    strategy:
      matrix:
        preset:
          - windows-msvc-release
          - windows-msvc-asan

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Configure MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }}

      - name: Build Houdini package
        if: matrix.preset == 'windows-msvc-release'
        run: cmake --build --preset windows-msvc-release --target houio_houdini_package

      - name: Upload Houdini package
        if: matrix.preset == 'windows-msvc-release'
        uses: actions/upload-artifact@v7
        with:
          name: houio-houdini-package-windows-x86_64
          path: build/windows-msvc-release/houio-houdini-package-*.zip
          if-no-files-found: error

  linux-gcc:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        preset:
          - linux-gcc-release
          - linux-gcc-ubsan

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }}

  linux-clang-fuzzer:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Configure
        run: cmake --preset linux-clang-fuzzer

      - name: Build
        run: cmake --build --preset linux-clang-fuzzer

      - name: Fuzz parser smoke test
        run: ./build/linux-clang-fuzzer/houio_fuzz_parser -runs=2000 -max_len=512 -timeout=5
