name: CI

on:
  push:
    branches:
      - master
      - "experiment/**"
  pull_request:

permissions:
  contents: read

jobs:
  windows-msvc:
    runs-on: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake --preset windows-msvc-release

      - name: Build
        run: cmake --build --preset windows-msvc-release

      - name: Test
        run: ctest --preset windows-msvc-release

  linux-gcc:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure
        run: cmake --preset linux-gcc-release

      - name: Build
        run: cmake --build --preset linux-gcc-release

      - name: Test
        run: ctest --preset linux-gcc-release
